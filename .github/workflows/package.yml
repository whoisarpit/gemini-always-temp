name: Package Extensions

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from manifest
        id: version
        run: echo "version=$(jq -r .version chrome/manifest.json)" >> "$GITHUB_OUTPUT"

      - name: Package Chrome extension
        run: cd chrome && zip -r ../gemini-always-temp-chrome.zip .

      - name: Package Firefox extension
        run: cd firefox && zip -r ../gemini-always-temp-firefox.zip .

      - name: Upload Chrome extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: gemini-always-temp-chrome
          path: gemini-always-temp-chrome.zip

      - name: Upload Firefox extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: gemini-always-temp-firefox
          path: gemini-always-temp-firefox.zip

      - name: Check if release exists
        if: github.event_name == 'push'
        id: check_release
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        if: github.event_name == 'push' && steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: |
            gemini-always-temp-chrome.zip
            gemini-always-temp-firefox.zip
