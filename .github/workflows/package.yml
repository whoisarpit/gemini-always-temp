name: Package Extensions

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from manifest
        id: version
        run: echo "version=$(jq -r .version chrome/manifest.json)" >> "$GITHUB_OUTPUT"

      - name: Package Chrome extension
        run: cd chrome && zip -r ../gemini-always-temp-chrome.zip .

      - name: Upload Chrome extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: gemini-always-temp-chrome
          path: gemini-always-temp-chrome.zip

      - name: Check if release exists
        if: github.event_name == 'push'
        id: check_release
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        if: github.event_name == 'push' && steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: gemini-always-temp-chrome.zip

  sign-firefox:
    needs: package
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Read version from manifest
        id: version
        run: echo "version=$(jq -r .version chrome/manifest.json)" >> "$GITHUB_OUTPUT"

      - name: Sign Firefox extension
        run: |
          npx web-ext sign \
            --source-dir=firefox/ \
            --artifacts-dir=web-ext-artifacts/ \
            --channel=unlisted \
            --api-key="${{ secrets.AMO_JWT_ISSUER }}" \
            --api-secret="${{ secrets.AMO_JWT_SECRET }}"
          mv web-ext-artifacts/*.xpi gemini-always-temp-firefox.xpi

      - name: Upload Firefox extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: gemini-always-temp-firefox
          path: gemini-always-temp-firefox.xpi

      - name: Upload Firefox XPI to release
        run: gh release upload "v${{ steps.version.outputs.version }}" gemini-always-temp-firefox.xpi --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
